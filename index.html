<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario Ambiental Firebase PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0c4d47;margin:0;padding:20px}
.container{max-width:1200px;margin:auto;background:#f5f1e7;border-radius:20px;overflow:hidden}
.header{background:#0d6057;color:white;padding:25px;text-align:center}
.layout{display:grid;grid-template-columns:300px 1fr}
.sidebar{background:#0d6057;color:white;padding:20px}
.calendar{padding:20px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.day{background:white;border-radius:10px;padding:10px;min-height:100px;border:2px solid #ddd;cursor:pointer}
.day:hover{transform:scale(1.02)}
.panel{background:white;padding:20px;border-radius:20px;margin-top:20px;display:none}
.panel.active{display:block}
input,textarea,select{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
button{padding:10px;border:none;border-radius:8px;cursor:pointer;margin-top:10px}
.event{background:#2e7d32;color:white;padding:5px;border-radius:6px;margin-top:5px;font-size:12px}
.gallery{display:flex;gap:10px;overflow:auto;margin-top:15px}
.gallery img{height:180px;border-radius:10px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;padding:20px}
.modalbox{background:white;padding:20px;border-radius:20px;width:90%;max-width:800px;max-height:90vh;overflow:auto}
img.main{width:100%;border-radius:10px;margin-top:15px}
iframe{width:100%;height:350px;border:none;border-radius:10px;margin-top:15px}
.status{background:#dcedc8;color:#1b5e20;padding:10px;border-radius:10px;margin-bottom:15px;font-weight:bold}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>🌿 Calendario Ambiental Firebase PRO</h1>
</div>

<div class="layout">

<div class="sidebar">

<div class="status">
🔥 Conectado con Firebase
</div>

<h2>🌎 Eventos</h2>

<div id="events"></div>

<button onclick="admin()">🔐 Administrador</button>

<button id="logout" onclick="logout()" style="display:none;background:#c62828;color:white">
🚪 Salir
</button>

</div>

<div class="calendar">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<button onclick="change(-1)">◀</button>
<h2 id="month"></h2>
<button onclick="change(1)">▶</button>
</div>

<div class="grid" id="calendar"></div>

<div class="panel" id="panel">

<h2 id="selected"></h2>

<div id="dayevents"></div>

<div id="tools" style="display:none">

<input id="title" placeholder="Título">

<input id="date" type="date">

<select id="type">
<option value="school">Colegio</option>
<option value="national">Nacional</option>
<option value="international">Internacional</option>
</select>

<textarea id="description" placeholder="Descripción"></textarea>

<input id="link" placeholder="YouTube, Canva, Facebook, Genially">

<label>Imagen principal</label>
<input type="file" id="mainImage" accept="image/*">

<label>Carrusel (máx 5)</label>
<input type="file" id="gallery" multiple accept="image/*">

<button onclick="save()">Guardar Evento</button>

</div>

</div>

</div>

</div>

</div>

<div class="modal" id="modal">
<div class="modalbox" id="modalbox"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBAVbML_9SysLKpkK_dMAnipQ2emKQCBZU",

  authDomain: "calendario-ambiental-48d97.firebaseapp.com",

  projectId: "calendario-ambiental-48d97",

  storageBucket: "calendario-ambiental-48d97.firebasestorage.app",

  messagingSenderId: "956848454278",

  appId: "1:956848454278:web:c69d7eba84ccfc87806f07"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let current=new Date();
let selectedDate=null;
let adminMode=false;
let editId=null;
let events=[];

async function loadEvents(){

events=[];

const querySnapshot = await getDocs(collection(db,"eventos"));

querySnapshot.forEach((d)=>{
events.push({
id:d.id,
...d.data()
});
});

render();

}

function render(){

const months=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];

document.getElementById("month").innerText=months[current.getMonth()]+" "+current.getFullYear();

const cal=document.getElementById("calendar");
const evs=document.getElementById("events");

cal.innerHTML="";
evs.innerHTML="";

events.forEach((e,i)=>{

evs.innerHTML+=`
<div style='background:#2e7d32;padding:10px;border-radius:10px;margin-bottom:10px'>
<strong>${e.title}</strong><br>
<small>${e.date}</small><br>
<button onclick='openEvent(${i})'>Ver</button>
</div>`;

});

const first=new Date(current.getFullYear(),current.getMonth(),1).getDay();

const total=new Date(current.getFullYear(),current.getMonth()+1,0).getDate();

for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

for(let d=1;d<=total;d++){

const date=current.getFullYear()+"-"+String(current.getMonth()+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

let html="<strong>"+d+"</strong>";

events.filter(x=>x.date===date).forEach(x=>{
html+="<div class='event'>"+x.title+"</div>";
});

const div=document.createElement("div");

div.className="day";

div.innerHTML=html;

div.onclick=()=>select(date);

cal.appendChild(div);

}

}

window.select=function(date){

selectedDate=date;

document.getElementById("panel").classList.add("active");

document.getElementById("selected").innerText="📅 "+date;

const area=document.getElementById("dayevents");

area.innerHTML="";

events.filter(x=>x.date===date).forEach(x=>{

let adminButtons="";

if(adminMode){

adminButtons=`
<button onclick='edit("${x.id}")'>Editar</button>
<button onclick='removeEvent("${x.id}")' style='background:#c62828;color:white'>Eliminar</button>`;

}

area.innerHTML+=`
<div style='background:#f4faf7;padding:15px;border-radius:10px;margin-top:10px'>
<strong>${x.title}</strong><br><br>
<button onclick='showEvent("${x.id}")'>Ver información</button>
${adminButtons}
</div>`;

});

document.getElementById("date").value=date;

}

window.admin=function(){

const u=prompt("Usuario");
const p=prompt("Contraseña");

if(u==="admin" && p==="aula_verde_2026"){

adminMode=true;

document.getElementById("tools").style.display="block";
document.getElementById("logout").style.display="inline-block";

alert("Modo administrador activado");

}else{

alert("Credenciales incorrectas");

}

}

window.logout=function(){

adminMode=false;

document.getElementById("tools").style.display="none";
document.getElementById("logout").style.display="none";

alert("Sesión cerrada");

}

function compress(file,max=1200,quality=.6){

return new Promise(resolve=>{

const img=new Image();
const reader=new FileReader();

reader.onload=e=>{

img.onload=()=>{

const c=document.createElement("canvas");

let w=img.width,h=img.height;

if(w>max){
h*=max/w;
w=max;
}

c.width=w;
c.height=h;

c.getContext("2d").drawImage(img,0,0,w,h);

resolve(c.toDataURL("image/jpeg",quality));

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}

window.save=async function(){

const title=document.getElementById("title").value;
const date=document.getElementById("date").value;
const type=document.getElementById("type").value;
const description=document.getElementById("description").value;
const link=document.getElementById("link").value;

if(!title || !date || !description){

alert("Completa todos los campos");
return;

}

let main="";

const mainFile=document.getElementById("mainImage").files[0];

if(mainFile){

main=await compress(mainFile,1200,.6);

}

const gallery=[];

const files=[...document.getElementById("gallery").files].slice(0,5);

for(let f of files){

gallery.push(await compress(f,800,.5));

}

const obj={title,date,type,description,link,main,gallery};

if(editId===null){

await addDoc(collection(db,"eventos"),obj);

}else{

await updateDoc(doc(db,"eventos",editId),obj);

editId=null;

}

await loadEvents();

select(date);

alert("Evento guardado online");

}

window.edit=function(id){

const x=events.find(e=>e.id===id);

title.value=x.title;
date.value=x.date;
type.value=x.type;
description.value=x.description;
link.value=x.link||"";

editId=id;

}

window.removeEvent=async function(id){

if(confirm("¿Eliminar evento?")){

await deleteDoc(doc(db,"eventos",id));

await loadEvents();

}

}

window.showEvent=function(id){

const x=events.find(e=>e.id===id);

let gallery="";

if(x.gallery && x.gallery.length){

gallery="<div class='gallery'>";

x.gallery.forEach(g=>{
gallery+="<img src='"+g+"'>";
});

gallery+="</div>";

}

let main="";

if(x.main){
main="<img class='main' src='"+x.main+"'>";
}

let media="";

if(x.link){

if(x.link.includes("youtube")||x.link.includes("youtu")){

media="<iframe src='"+x.link.replace('watch?v=','embed/')+"'></iframe>";

}else{

media="<a href='"+x.link+"' target='_blank'><button>Abrir Recurso</button></a>";

}

}

document.getElementById("modalbox").innerHTML=`
<h2>${x.title}</h2>
<p><strong>Fecha:</strong> ${x.date}</p>
<p>${x.description}</p>
${main}
${gallery}
${media}
<button onclick='closeModal()' style='background:#c62828;color:white'>Cerrar</button>
`;

document.getElementById("modal").style.display="flex";

}

window.closeModal=function(){

document.getElementById("modal").style.display="none";

}

window.change=function(v){

current.setMonth(current.getMonth()+v);

render();

}

loadEvents();

</script>

</body>
</html>
