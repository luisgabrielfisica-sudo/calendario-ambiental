<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario Ambiental Firebase PRO UI Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
font-family:Arial;
background:#0c4d47;
margin:0;
padding:14px;
}

.container{
max-width:880px;
margin:auto;
background:#f5f1e7;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.18);
}

.header{
background:#0d6057;
color:white;
padding:18px;
text-align:center;
}

.layout{
display:grid;
grid-template-columns:220px 1fr;
}

.sidebar{
background:#0d6057;
color:white;
padding:14px;
}

.calendar{
padding:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:7px;
}

.day{
background:white;
border-radius:10px;
padding:8px;
min-height:78px;
border:2px solid #ddd;
cursor:pointer;
transition:.2s;
font-size:13px;
}

.day:hover{
transform:scale(1.02);
border-color:#0d6057;
}

.panel{
background:white;
padding:14px;
border-radius:16px;
margin-top:16px;
display:none;
}

.panel.active{
display:block;
}

input,textarea,select{
width:100%;
padding:9px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
font-size:13px;
}

button{
padding:9px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:8px;
font-size:13px;
background:#0d6057;
color:white;
}

.event{
background:#2e7d32;
color:white;
padding:4px;
border-radius:6px;
margin-top:4px;
font-size:11px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:18px;
}

.modalbox{
background:white;
padding:18px;
border-radius:18px;
width:90%;
max-width:700px;
max-height:90vh;
overflow:auto;
}

img.main{
width:60%;
display:block;
margin:14px auto;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.carousel-container{
position:relative;
margin-top:14px;
}

.gallery{
display:flex;
gap:12px;
overflow-x:auto;
scroll-behavior:smooth;
padding:8px 40px;
}

.gallery::-webkit-scrollbar{
height:6px;
}

.gallery::-webkit-scrollbar-thumb{
background:#0d6057;
border-radius:20px;
}

.gallery img{
height:135px;
border-radius:12px;
object-fit:cover;
flex-shrink:0;
box-shadow:0 4px 10px rgba(0,0,0,.18);
}

.carousel-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:34px;
height:34px;
border-radius:50%;
background:#0d6057;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
z-index:10;
}

.carousel-left{
left:0;
}

.carousel-right{
right:0;
}

iframe{
width:100%;
height:300px;
border:none;
border-radius:10px;
margin-top:12px;
}

.status{
background:#dcedc8;
color:#1b5e20;
padding:8px;
border-radius:8px;
margin-bottom:12px;
font-weight:bold;
font-size:13px;
}

@media(max-width:900px){

.layout{
grid-template-columns:1fr;
}

.calendar{
overflow-x:auto;
}

.grid{
grid-template-columns:repeat(7,minmax(45px,1fr));
gap:4px;
min-width:350px;
}

.day{
min-height:58px;
padding:4px;
font-size:10px;
border-radius:8px;
}

.event{
font-size:7px;
padding:2px;
margin-top:2px;
}

img.main{
width:85%;
}

.gallery{
padding:6px 30px;
}

.gallery img{
height:95px;
}

.carousel-btn{
width:28px;
height:28px;
font-size:14px;
}

}

.modalbox h2{
color:#0d6057;
margin-bottom:10px;
}

.modalbox p{
line-height:1.5;
margin-top:10px;
}

.gallery{
align-items:center;
}

.gallery img:hover{
transform:scale(1.03);
transition:.2s;
}

</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>🌿 Calendario Ambiental Firebase PRO</h1>
</div>

<div class="layout">

<div class="sidebar">

<div class="status">
🔥 Conectado con Firebase
</div>

<h2>🌎 Eventos</h2>

<div id="events"></div>

<button onclick="admin()">🔐 Administrador</button>

<button id="logout" onclick="logout()" style="display:none;background:#c62828;color:white">
🚪 Salir
</button>

</div>

<div class="calendar">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<button onclick="change(-1)">◀</button>
<h2 id="month"></h2>
<button onclick="change(1)">▶</button>
</div>

<div class="grid" id="calendar"></div>

<div class="panel" id="panel">

<h2 id="selected"></h2>

<div id="dayevents"></div>

<div id="tools" style="display:none">

<input id="title" placeholder="Título">

<input id="date" type="date">

<select id="type">
<option value="school">Colegio</option>
<option value="national">Nacional</option>
<option value="international">Internacional</option>
</select>

<textarea id="description" placeholder="Descripción"></textarea>

<input id="link" placeholder="YouTube, Canva, Facebook, Genially">

<label>Imagen principal</label>
<input type="file" id="mainImage" accept="image/*">

<label>Carrusel (máx 5)</label>
<input type="file" id="gallery" multiple accept="image/*">

<button onclick="save()">Guardar Evento</button>

</div>

</div>

</div>

</div>

</div>

<div class="modal" id="modal">
<div class="modalbox" id="modalbox"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBAVbML_9SysLKpkK_dMAnipQ2emKQCBZU",
authDomain: "calendario-ambiental-48d97.firebaseapp.com",
projectId: "calendario-ambiental-48d97",
storageBucket: "calendario-ambiental-48d97.firebasestorage.app",
messagingSenderId: "956848454278",
appId: "1:956848454278:web:c69d7eba84ccfc87806f07"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let current=new Date();
let selectedDate=null;
let adminMode=false;
let editId=null;
let events=[];

async function loadEvents(){
events=[];
const querySnapshot = await getDocs(collection(db,"eventos"));

querySnapshot.forEach((d)=>{
events.push({
id:d.id,
...d.data()
});
});

render();
}

function render(){

const months=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];

document.getElementById("month").innerText=months[current.getMonth()]+" "+current.getFullYear();

const cal=document.getElementById("calendar");
const evs=document.getElementById("events");

cal.innerHTML="";
evs.innerHTML="";

events.forEach((e,i)=>{

evs.innerHTML+=`
<div style='background:#2e7d32;padding:8px;border-radius:10px;margin-bottom:8px'>
<strong>${e.title}</strong><br>
<small>${e.date}</small><br>
<button onclick='openEvent(${i})'>Ver</button>
</div>`;

});

const first=new Date(current.getFullYear(),current.getMonth(),1).getDay();
const total=new Date(current.getFullYear(),current.getMonth()+1,0).getDate();

for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

for(let d=1;d<=total;d++){

const date=current.getFullYear()+"-"+String(current.getMonth()+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

let html="<strong>"+d+"</strong>";

events.filter(x=>x.date===date).forEach(x=>{
html+="<div class='event'>"+x.title+"</div>";
});

const div=document.createElement("div");

div.className="day";
div.innerHTML=html;
div.onclick=()=>select(date);

cal.appendChild(div);
}
}

window.select=function(date){

selectedDate=date;

document.getElementById("panel").classList.add("active");

document.getElementById("selected").innerText="📅 "+date;

const area=document.getElementById("dayevents");

area.innerHTML="";

events.filter(x=>x.date===date).forEach(x=>{

let adminButtons="";

if(adminMode){

adminButtons=`
<button onclick='edit("${x.id}")'>Editar</button>
<button onclick='removeEvent("${x.id}")' style='background:#c62828;color:white'>Eliminar</button>`;
}

area.innerHTML+=`
<div style='background:#f4faf7;padding:12px;border-radius:10px;margin-top:8px'>
<strong>${x.title}</strong><br><br>
<button onclick='showEvent("${x.id}")'>Ver información</button>
${adminButtons}
</div>`;
});

document.getElementById("date").value=date;
}

window.admin=function(){

const u=prompt("Usuario");
const p=prompt("Contraseña");

if(u==="admin" && p==="aula_verde_2026"){

adminMode=true;

document.getElementById("tools").style.display="block";
document.getElementById("logout").style.display="inline-block";

alert("Modo administrador activado");

}else{
alert("Credenciales incorrectas");
}
}

window.logout=function(){
adminMode=false;
document.getElementById("tools").style.display="none";
document.getElementById("logout").style.display="none";
alert("Sesión cerrada");
}

window.showEvent=function(id){

const x=events.find(e=>e.id===id);

let gallery="";

if(x.gallery && x.gallery.length){

gallery=`
<div class='carousel-container'>

<button class='carousel-btn carousel-left'
onclick='moveGallery(-1)'>❮</button>

<div class='gallery' id='galleryTrack'>`;

x.gallery.forEach(g=>{
gallery+="<img src='"+g+"'>";
});

gallery+=`</div>

<button class='carousel-btn carousel-right'
onclick='moveGallery(1)'>❯</button>

</div>`;
}

let main="";

if(x.main){
main="<img class='main' src='"+x.main+"'>";
}

let media="";

if(x.link){

if(x.link.includes("youtube")||x.link.includes("youtu")){

media="<iframe src='"+x.link.replace('watch?v=','embed/')+"'></iframe>";

}else{

media="<a href='"+x.link+"' target='_blank'><button>Abrir Recurso</button></a>";
}
}

document.getElementById("modalbox").innerHTML=`
<h2>${x.title}</h2>
<p><strong>Fecha:</strong> ${x.date}</p>
<p>${x.description}</p>
${main}
${gallery}
${media}
<button onclick='closeModal()' style='background:#c62828;color:white'>Cerrar</button>
`;

document.getElementById("modal").style.display="flex";
}

window.moveGallery=function(direction){

const gallery=document.getElementById("galleryTrack");

gallery.scrollLeft += direction * 220;
}

window.closeModal=function(){
document.getElementById("modal").style.display="none";
}

window.change=function(v){
current.setMonth(current.getMonth()+v);
render();
}

loadEvents();

</script>

</body>
</html>
